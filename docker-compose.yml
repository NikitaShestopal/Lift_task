version: '3.8'

services:
    # PHP додаток з розширеннями
    php:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: symfony_php
        volumes:
            - ./:/var/www/html:cached
        depends_on:
            - mongodb
            - redis
        networks:
            - symfony_network

    # Веб-сервер Nginx
    webserver:
        image: nginx:alpine
        container_name: symfony_webserver
        ports:
            - "80:80"
        volumes:
            - ./:/var/www/html:cached
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - php
        networks:
            - symfony_network

    # MongoDB
    mongodb:
        image: mongo:latest
        container_name: symfony_mongodb
        environment:
            MONGO_INITDB_ROOT_USERNAME: root
            MONGO_INITDB_ROOT_PASSWORD: secret_password
            MONGO_INITDB_DATABASE: symfony_db
        ports:
            - "27017:27017"
        volumes:
            - mongodb_data:/data/db
        networks:
            - symfony_network

    # Redis
    redis:
        image: redis:alpine
        container_name: symfony_redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - symfony_network

volumes:
    mongodb_data:
    redis_data:

networks:
    symfony_network:
        driver: bridge
